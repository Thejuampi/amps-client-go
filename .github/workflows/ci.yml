name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Generate gosec report
        run: make gosec-report GOSEC_REPORT=gosec-report.sarif

      - name: Upload gosec report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: gosec-report.sarif

      - name: Upload gosec SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec-report.sarif

      - name: Code scanning
        run: make scan

      - name: Unit tests
        run: go test ./... -skip Integration

      - name: Race tests
        run: make test-race

      - name: Build
        run: go build ./...

      - name: Parity check (if C++ headers are available)
        shell: bash
        run: |
          if [ -d "../amps-c++-client-5.3.5.1-Windows" ]; then
            go run ./tools/paritycheck -manifest tools/parity_manifest.json
          else
            echo "Skipping parity check: ../amps-c++-client-5.3.5.1-Windows not found on runner."
          fi

      - name: Coverage profile
        run: go test -count=1 ./amps/... -coverprofile=coverage.out

      - name: Coverage gate
        run: go run ./tools/coveragegate -profile coverage.out
