name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in X.Y.Z format"
        required: true
        type: string
      runner_labels:
        description: "JSON array of runs-on labels"
        required: true
        default: '["ubuntu-latest"]'
        type: string
      dry_run:
        description: "Validate the full release flow without committing, tagging, pushing, or publishing"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ${{ fromJson(github.event.inputs.runner_labels) }}
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version }}
      RELEASE_TAG: v${{ github.event.inputs.version }}
      RELEASE_DRY_RUN: ${{ github.event.inputs.dry_run }}
    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail

          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin "+refs/heads/main:refs/remotes/origin/main" --tags --prune
          git checkout -B main refs/remotes/origin/main

      - name: Configure authenticated git remote
        shell: bash
        env:
          RELEASE_PUSH_TOKEN: ${{ secrets['RELEASE_PUSH_TOKEN'] }}
          GITHUB_PUSH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          PUSH_TOKEN="${RELEASE_PUSH_TOKEN:-}"
          if [[ -z "${PUSH_TOKEN}" ]]; then
            PUSH_TOKEN="${GITHUB_PUSH_TOKEN}"
            echo "Using GITHUB_TOKEN for git fetch/push operations."
            echo "If protected main pushes fail, configure RELEASE_PUSH_TOKEN with bypass rights."
          else
            echo "Using RELEASE_PUSH_TOKEN for git fetch/push operations."
          fi

          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate release input and repository state
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match X.Y.Z, got '${RELEASE_VERSION}'."
            exit 1
          fi

          git fetch origin main --tags --prune

          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
            echo "Run this workflow from the latest main commit."
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "Tag ${RELEASE_TAG} already exists."
            exit 1
          fi

      - name: Update version files
        shell: bash
        run: |
          set -euo pipefail

          printf '%s\n' "${RELEASE_VERSION}" > VERSION
          RELEASE_VERSION="${RELEASE_VERSION}" perl -0pi -e 's/^Version:\s*`[^`]+`$/"Version: `" . $ENV{RELEASE_VERSION} . "`"/me' README.md
          RELEASE_VERSION="${RELEASE_VERSION}" perl -0pi -e 's/^(\s*ClientVersion\s*=\s*)"[^"]+"/$1 . "\"" . $ENV{RELEASE_VERSION} . "\""/me' amps/client.go

          if git diff --quiet -- VERSION README.md amps/client.go; then
            echo "Release version files did not change."
            exit 1
          fi

      - name: Release gates
        run: make release-hosted

      - name: Vulnerability scan (advisory)
        continue-on-error: true
        run: make vuln-scan

      - name: Commit release bump
        if: env.RELEASE_DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git add VERSION README.md amps/client.go
          git commit -m "release: ${RELEASE_TAG}"

      - name: Create annotated tag
        if: env.RELEASE_DRY_RUN != 'true'
        run: git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"

      - name: Push branch and tag
        if: env.RELEASE_DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if ! git push origin HEAD:main; then
            echo "Push to main failed."
            echo "If main is protected, configure the RELEASE_PUSH_TOKEN secret with a token that can bypass branch protection."
            exit 1
          fi
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub release
        if: env.RELEASE_DRY_RUN != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${RELEASE_TAG}" --verify-tag --generate-notes

      - name: Warm Go proxy and pkg.go.dev (non-blocking)
        if: env.RELEASE_DRY_RUN != 'true'
        shell: bash
        run: |
          set +e
          URLS=(
            "https://proxy.golang.org/github.com/Thejuampi/amps-client-go/@v/${RELEASE_TAG}.info"
            "https://pkg.go.dev/github.com/Thejuampi/amps-client-go/amps@${RELEASE_TAG}"
          )
          for URL in "${URLS[@]}"; do
            echo "Requesting ${URL}"
            curl -fsS --retry 3 --retry-delay 2 "${URL}" || true
          done
          exit 0

      - name: Release summary
        shell: bash
        run: |
          {
            if [[ "${RELEASE_DRY_RUN}" == "true" ]]; then
              echo "## Dry run succeeded"
              echo
              echo "No commit, tag, push, or GitHub Release was created."
            else
              echo "## Release created"
            fi
            echo
            echo "- Version: ${RELEASE_VERSION}"
            echo "- Tag: ${RELEASE_TAG}"
            echo "- Dry run: ${RELEASE_DRY_RUN}"
            if [[ -d ../amps-c++-client-5.3.5.1-Windows ]]; then
              echo "- Parity check: executed"
            else
              echo "- Parity check: skipped because ../amps-c++-client-5.3.5.1-Windows is absent"
            fi
            if [[ "${RELEASE_DRY_RUN}" != "true" ]]; then
              echo "- Release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
